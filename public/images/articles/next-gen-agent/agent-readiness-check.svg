<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
	<title id="title">Agent 落地准备度检查</title>
	<desc id="desc">数据、工具、权限、评估、兜底五项准备度检查。</desc>
	<rect width="960" height="540" fill="#f8fafc"/>
	<text x="64" y="82" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="700">放开自主性之前，先查五件事</text>
	<g font-family="Arial, sans-serif" font-size="22" font-weight="700">
		<rect x="72" y="130" width="816" height="62" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="112" y="170" fill="#0f172a">1. 数据是否干净、可追溯</text>
		<rect x="72" y="210" width="816" height="62" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="112" y="250" fill="#0f172a">2. 工具是否可控，有超时和错误返回</text>
		<rect x="72" y="290" width="816" height="62" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="112" y="330" fill="#0f172a">3. 权限是否分级，高风险动作要确认</text>
		<rect x="72" y="370" width="816" height="62" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="112" y="410" fill="#0f172a">4. 结果是否能评估，不靠感觉判断</text>
		<rect x="72" y="450" width="816" height="62" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="112" y="490" fill="#0f172a">5. 失败是否能停止、降级或回滚</text>
	</g>
</svg>
