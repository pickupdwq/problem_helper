<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">下一代 Agent 架构</title>
	<desc id="desc">感知、规划、执行、复盘四层组成的下一代 Agent 架构示意图。</desc>
	<rect width="1200" height="630" fill="#f8fafc"/>
	<rect x="72" y="72" width="1056" height="486" rx="28" fill="#ffffff" stroke="#dbe3ec"/>
	<text x="108" y="136" fill="#0f172a" font-family="Arial, sans-serif" font-size="38" font-weight="700">下一代 Agent 架构</text>
	<text x="108" y="178" fill="#64748b" font-family="Arial, sans-serif" font-size="20">从被动执行，走向可观察、可规划、可兜底</text>
	<g font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">
		<rect x="118" y="260" width="190" height="128" rx="18" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="213" y="334" fill="#075985">感知</text>
		<rect x="370" y="260" width="190" height="128" rx="18" fill="#dcfce7" stroke="#22c55e"/>
		<text x="465" y="334" fill="#166534">规划</text>
		<rect x="622" y="260" width="190" height="128" rx="18" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="717" y="334" fill="#92400e">执行</text>
		<rect x="874" y="260" width="190" height="128" rx="18" fill="#ede9fe" stroke="#8b5cf6"/>
		<text x="969" y="334" fill="#5b21b6">复盘</text>
	</g>
	<g stroke="#94a3b8" stroke-width="4" stroke-linecap="round" fill="none">
		<path d="M308 324h62"/>
		<path d="M560 324h62"/>
		<path d="M812 324h62"/>
		<path d="M969 388c0 72-756 72-756 0"/>
	</g>
	<g fill="#64748b" font-family="Arial, sans-serif" font-size="18">
		<text x="152" y="438">环境、用户、系统状态</text>
		<text x="392" y="438">目标拆解、风险判断</text>
		<text x="648" y="438">工具调用、状态跟踪</text>
		<text x="900" y="438">评估、记忆、改进</text>
	</g>
</svg>
