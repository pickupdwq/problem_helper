<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">Agent 管道模式</title>
	<desc id="desc">多个 Agent 按阶段处理数据的管道模式。</desc>
	<rect width="1200" height="630" fill="#f8fafc"/>
	<text x="88" y="120" fill="#0f172a" font-family="Arial, sans-serif" font-size="40" font-weight="700">Agent 链式调用与管道模式</text>
	<g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
		<rect x="100" y="290" width="160" height="78" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="180" y="338" fill="#0f172a">输入</text>
		<rect x="330" y="290" width="160" height="78" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="410" y="338" fill="#075985">清洗</text>
		<rect x="560" y="290" width="160" height="78" rx="16" fill="#dcfce7" stroke="#22c55e"/>
		<text x="640" y="338" fill="#166534">分析</text>
		<rect x="790" y="290" width="160" height="78" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="870" y="338" fill="#92400e">验证</text>
		<rect x="1020" y="290" width="110" height="78" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="1075" y="338" fill="#0f172a">输出</text>
	</g>
	<g stroke="#94a3b8" stroke-width="5" fill="none" stroke-linecap="round">
		<path d="M260 329h70"/>
		<path d="M490 329h70"/>
		<path d="M720 329h70"/>
		<path d="M950 329h70"/>
	</g>
</svg>
