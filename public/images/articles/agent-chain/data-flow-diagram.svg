<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
	<title id="title">Agent 管道数据流</title>
	<desc id="desc">原始输入、中间结果、元数据和最终输出的数据流示意。</desc>
	<rect width="960" height="540" fill="#f8fafc"/>
	<text x="64" y="78" fill="#0f172a" font-family="Arial, sans-serif" font-size="32" font-weight="700">管道里流动的不只是文本</text>
	<g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
		<rect x="90" y="220" width="180" height="94" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="180" y="276" fill="#0f172a">原始输入</text>
		<rect x="390" y="150" width="180" height="82" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="480" y="199" fill="#075985">中间结果</text>
		<rect x="390" y="300" width="180" height="82" rx="16" fill="#dcfce7" stroke="#22c55e"/>
		<text x="480" y="349" fill="#166534">元数据</text>
		<rect x="690" y="220" width="180" height="94" rx="18" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="780" y="276" fill="#92400e">最终输出</text>
	</g>
	<g stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round">
		<path d="M270 267h90"/>
		<path d="M360 267v-76h30"/>
		<path d="M360 267v74h30"/>
		<path d="M570 191h60v76h60"/>
		<path d="M570 341h60v-74h60"/>
	</g>
</svg>
