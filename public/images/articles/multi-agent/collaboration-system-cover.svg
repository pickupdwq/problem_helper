<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">多 Agent 协作系统</title>
	<desc id="desc">协调者拆分任务，多个专业 Agent 执行，最终统一验证。</desc>
	<rect width="1200" height="630" fill="#f8fafc"/>
	<text x="88" y="120" fill="#0f172a" font-family="Arial, sans-serif" font-size="38" font-weight="700">多 Agent 协作，不是堆人手</text>
	<g font-family="Arial, sans-serif" text-anchor="middle" font-size="22" font-weight="700">
		<rect x="470" y="180" width="260" height="90" rx="18" fill="#ede9fe" stroke="#8b5cf6"/>
		<text x="600" y="236" fill="#5b21b6">协调者</text>
		<rect x="110" y="360" width="210" height="90" rx="18" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="215" y="416" fill="#075985">架构</text>
		<rect x="365" y="360" width="210" height="90" rx="18" fill="#dcfce7" stroke="#22c55e"/>
		<text x="470" y="416" fill="#166534">测试</text>
		<rect x="625" y="360" width="210" height="90" rx="18" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="730" y="416" fill="#92400e">安全</text>
		<rect x="880" y="360" width="210" height="90" rx="18" fill="#fee2e2" stroke="#ef4444"/>
		<text x="985" y="416" fill="#991b1b">汇总</text>
	</g>
	<g stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round">
		<path d="M600 270v42"/>
		<path d="M600 312H215v48"/>
		<path d="M600 312H470v48"/>
		<path d="M600 312h130v48"/>
		<path d="M600 312h385v48"/>
	</g>
</svg>
