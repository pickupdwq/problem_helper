<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">Agent 容错机制</title>
	<desc id="desc">重试、降级、熔断、恢复组成的容错系统。</desc>
	<rect width="1200" height="630" fill="#f8fafc"/>
	<text x="88" y="120" fill="#0f172a" font-family="Arial, sans-serif" font-size="40" font-weight="700">Agent 错误处理与容错机制</text>
	<g font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">
		<rect x="135" y="265" width="200" height="110" rx="20" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="235" y="330" fill="#075985">重试</text>
		<rect x="385" y="265" width="200" height="110" rx="20" fill="#dcfce7" stroke="#22c55e"/>
		<text x="485" y="330" fill="#166534">降级</text>
		<rect x="635" y="265" width="200" height="110" rx="20" fill="#fee2e2" stroke="#ef4444"/>
		<text x="735" y="330" fill="#991b1b">熔断</text>
		<rect x="885" y="265" width="200" height="110" rx="20" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="985" y="330" fill="#92400e">恢复</text>
	</g>
</svg>
