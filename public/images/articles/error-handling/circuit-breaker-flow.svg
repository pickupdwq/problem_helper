<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
	<title id="title">熔断器状态流转</title>
	<desc id="desc">关闭、开启、半开三种熔断器状态。</desc>
	<rect width="960" height="540" fill="#f8fafc"/>
	<text x="64" y="78" fill="#0f172a" font-family="Arial, sans-serif" font-size="32" font-weight="700">熔断器不是报错，是保护系统</text>
	<g font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">
		<circle cx="230" cy="280" r="76" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
		<text x="230" y="289" fill="#166534">关闭</text>
		<circle cx="480" cy="280" r="76" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
		<text x="480" y="289" fill="#991b1b">开启</text>
		<circle cx="730" cy="280" r="76" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
		<text x="730" y="289" fill="#92400e">半开</text>
	</g>
	<g stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round">
		<path d="M306 280h98"/>
		<path d="M556 280h98"/>
		<path d="M730 356c0 76-500 76-500 0"/>
	</g>
</svg>
