<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">Agent 异步处理</title>
	<desc id="desc">请求进入队列后由后台执行器处理，结果通知用户。</desc>
	<rect width="1200" height="630" fill="#f8fafc"/>
	<text x="88" y="120" fill="#0f172a" font-family="Arial, sans-serif" font-size="40" font-weight="700">Agent 异步处理，别把队列当万能药</text>
	<g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
		<rect x="110" y="280" width="170" height="82" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="195" y="330" fill="#0f172a">请求</text>
		<rect x="360" y="260" width="220" height="122" rx="20" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="470" y="330" fill="#075985">任务队列</text>
		<rect x="660" y="260" width="220" height="122" rx="20" fill="#dcfce7" stroke="#22c55e"/>
		<text x="770" y="330" fill="#166534">后台执行</text>
		<rect x="960" y="280" width="140" height="82" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="1030" y="330" fill="#92400e">通知</text>
	</g>
	<g stroke="#94a3b8" stroke-width="5" fill="none" stroke-linecap="round">
		<path d="M280 321h80"/>
		<path d="M580 321h80"/>
		<path d="M880 321h80"/>
	</g>
</svg>
