<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">Agent 与 Skill 协作</title>
	<desc id="desc">Agent 负责判断，Skill 负责稳定流程。</desc>
	<rect width="1200" height="630" fill="#f8fafc"/>
	<rect x="80" y="82" width="1040" height="466" rx="30" fill="#ffffff" stroke="#dbe3ec"/>
	<text x="120" y="150" fill="#0f172a" font-family="Arial, sans-serif" font-size="38" font-weight="700">Agent 和 Skill 怎么配合才不乱</text>
	<g font-family="Arial, sans-serif" text-anchor="middle">
		<rect x="160" y="250" width="300" height="170" rx="24" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3"/>
		<text x="310" y="326" fill="#075985" font-size="34" font-weight="700">Agent</text>
		<text x="310" y="370" fill="#0369a1" font-size="22">判断变化</text>
		<rect x="740" y="250" width="300" height="170" rx="24" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
		<text x="890" y="326" fill="#166534" font-size="34" font-weight="700">Skill</text>
		<text x="890" y="370" fill="#15803d" font-size="22">固定经验</text>
	</g>
	<path d="M472 330h256" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
	<path d="M700 302l38 28-38 28" fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
	<text x="600" y="292" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="20">调度、执行、反馈</text>
</svg>
