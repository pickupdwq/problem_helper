<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">Skill 版本控制</title>
	<desc id="desc">Skill 从开发、灰度到回滚的版本生命周期。</desc>
	<rect width="1200" height="630" fill="#f8fafc"/>
	<text x="88" y="120" fill="#0f172a" font-family="Arial, sans-serif" font-size="40" font-weight="700">Skill 升级，最怕悄悄变味</text>
	<g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
		<rect x="102" y="280" width="170" height="82" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="187" y="330" fill="#075985">变更</text>
		<rect x="340" y="280" width="170" height="82" rx="16" fill="#dcfce7" stroke="#22c55e"/>
		<text x="425" y="330" fill="#166534">回归</text>
		<rect x="578" y="280" width="170" height="82" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="663" y="330" fill="#92400e">灰度</text>
		<rect x="816" y="280" width="170" height="82" rx="16" fill="#ede9fe" stroke="#8b5cf6"/>
		<text x="901" y="330" fill="#5b21b6">发布</text>
	</g>
	<g stroke="#94a3b8" stroke-width="5" fill="none" stroke-linecap="round">
		<path d="M272 321h68"/>
		<path d="M510 321h68"/>
		<path d="M748 321h68"/>
		<path d="M901 362v70H425v-70"/>
	</g>
	<text x="666" y="458" fill="#64748b" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">出问题要能切回旧版本</text>
</svg>
