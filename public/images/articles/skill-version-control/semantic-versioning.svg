<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
	<title id="title">Skill 版本号判断</title>
	<desc id="desc">根据兼容性判断 PATCH、MINOR、MAJOR。</desc>
	<rect width="960" height="540" fill="#f8fafc"/>
	<text x="66" y="76" fill="#0f172a" font-family="Arial, sans-serif" font-size="32" font-weight="700">版本号看接口，也看行为</text>
	<g font-family="Arial, sans-serif" font-size="22" font-weight="700">
		<rect x="80" y="135" width="800" height="82" rx="16" fill="#dcfce7" stroke="#22c55e"/>
		<text x="120" y="185" fill="#166534">PATCH：修 bug，使用者无感知</text>
		<rect x="80" y="245" width="800" height="82" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="120" y="295" fill="#075985">MINOR：新增能力，但旧用法还能跑</text>
		<rect x="80" y="355" width="800" height="82" rx="16" fill="#fee2e2" stroke="#ef4444"/>
		<text x="120" y="405" fill="#991b1b">MAJOR：输出、默认行为或适配方式变了</text>
	</g>
</svg>
