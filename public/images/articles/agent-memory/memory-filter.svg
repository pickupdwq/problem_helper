<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
	<title id="title">Agent 记忆筛选</title>
	<desc id="desc">记忆进入上下文前经过来源、时效、范围、风险四项检查。</desc>
	<rect width="960" height="540" fill="#f8fafc"/>
	<text x="64" y="78" fill="#0f172a" font-family="Arial, sans-serif" font-size="32" font-weight="700">一条记忆进入上下文前，要先过筛</text>
	<g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
		<rect x="74" y="230" width="150" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="149" y="279" fill="#0f172a">候选记忆</text>
		<rect x="284" y="140" width="130" height="64" rx="14" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="349" y="180" fill="#075985">来源</text>
		<rect x="284" y="250" width="130" height="64" rx="14" fill="#dcfce7" stroke="#22c55e"/>
		<text x="349" y="290" fill="#166534">时效</text>
		<rect x="486" y="140" width="130" height="64" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="551" y="180" fill="#92400e">范围</text>
		<rect x="486" y="250" width="130" height="64" rx="14" fill="#fee2e2" stroke="#ef4444"/>
		<text x="551" y="290" fill="#991b1b">风险</text>
		<rect x="708" y="230" width="170" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="793" y="279" fill="#0f172a">进入上下文</text>
	</g>
	<g stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round">
		<path d="M224 270h44"/>
		<path d="M616 270h92"/>
		<path d="M414 172h72"/>
		<path d="M414 282h72"/>
	</g>
</svg>
