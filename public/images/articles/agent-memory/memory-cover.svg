<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">Agent 记忆分层</title>
	<desc id="desc">工作记忆、会话记忆、长期记忆三层结构。</desc>
	<rect width="1200" height="630" fill="#f8fafc"/>
	<text x="88" y="120" fill="#0f172a" font-family="Arial, sans-serif" font-size="40" font-weight="700">Agent 记忆不是越多越好</text>
	<g font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">
		<rect x="220" y="190" width="760" height="86" rx="22" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="600" y="244" fill="#075985" font-size="28">工作记忆：当前任务</text>
		<rect x="170" y="310" width="860" height="86" rx="22" fill="#dcfce7" stroke="#22c55e"/>
		<text x="600" y="364" fill="#166534" font-size="28">会话记忆：本轮上下文</text>
		<rect x="120" y="430" width="960" height="86" rx="22" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="600" y="484" fill="#92400e" font-size="28">长期记忆：稳定偏好和规则</text>
	</g>
</svg>
