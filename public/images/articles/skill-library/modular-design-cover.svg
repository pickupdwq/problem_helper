<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">模块化 Skill 库</title>
	<desc id="desc">Skill 库由核心协议、注册中心、插件和运行时组成。</desc>
	<rect width="1200" height="630" fill="#f8fafc"/>
	<text x="88" y="120" fill="#0f172a" font-family="Arial, sans-serif" font-size="40" font-weight="700">构建可复用的 Agent Skill 库</text>
	<rect x="170" y="190" width="860" height="330" rx="28" fill="#ffffff" stroke="#dbe3ec"/>
	<g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
		<rect x="240" y="270" width="170" height="86" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
		<text x="325" y="322" fill="#075985">协议</text>
		<rect x="515" y="270" width="170" height="86" rx="16" fill="#dcfce7" stroke="#22c55e"/>
		<text x="600" y="322" fill="#166534">注册</text>
		<rect x="790" y="270" width="170" height="86" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
		<text x="875" y="322" fill="#92400e">插件</text>
		<rect x="430" y="410" width="340" height="72" rx="16" fill="#ede9fe" stroke="#8b5cf6"/>
		<text x="600" y="454" fill="#5b21b6">运行时</text>
	</g>
</svg>
