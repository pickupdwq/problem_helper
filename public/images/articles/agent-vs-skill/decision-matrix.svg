<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
	<title id="title">Agent 与 Skill 决策矩阵</title>
	<desc id="desc">一个二维矩阵，用任务不确定性和复用频率判断应该使用 Agent、Skill 或先用 Agent 再沉淀 Skill。</desc>
	<rect width="1200" height="720" fill="#fbfbf8"/>
	<text x="600" y="72" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700" fill="#1f2937">Agent / Skill 决策矩阵</text>
	<g transform="translate(170 130)">
		<rect width="860" height="460" rx="18" fill="#ffffff" stroke="#d9ded8" stroke-width="2"/>
		<line x1="430" y1="0" x2="430" y2="460" stroke="#d9ded8" stroke-width="2"/>
		<line x1="0" y1="230" x2="860" y2="230" stroke="#d9ded8" stroke-width="2"/>
		<rect x="24" y="24" width="382" height="182" rx="14" fill="#eef7f1"/>
		<rect x="454" y="24" width="382" height="182" rx="14" fill="#eaf1f8"/>
		<rect x="24" y="254" width="382" height="182" rx="14" fill="#f6f0e5"/>
		<rect x="454" y="254" width="382" height="182" rx="14" fill="#f2ecef"/>
		<text x="215" y="78" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#17412a">用 Agent 探路</text>
		<text x="215" y="122" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#456052">低复用，高不确定</text>
		<text x="215" y="158" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#456052">调研、排障、方案探索</text>
		<text x="645" y="78" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#173a55">先 Agent，后 Skill</text>
		<text x="645" y="122" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#405c72">高复用，高不确定</text>
		<text x="645" y="158" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#405c72">先跑通，再沉淀流程</text>
		<text x="215" y="308" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#5a3f12">普通提示即可</text>
		<text x="215" y="352" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#695839">低复用，低不确定</text>
		<text x="215" y="388" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#695839">一次性小任务</text>
		<text x="645" y="308" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#5a2f3f">用 Skill 固化</text>
		<text x="645" y="352" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#6b4a58">高复用，低不确定</text>
		<text x="645" y="388" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#6b4a58">规范、检查表、发布流程</text>
	</g>
	<text x="600" y="642" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#66736d">横轴：复用频率从低到高 / 纵轴：任务不确定性从低到高</text>
</svg>
